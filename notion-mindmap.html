<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mind Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── 툴바 ── */
  #toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-bottom: 1px solid #e8e8e5;
    background: #fff; flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar .title { font-size: 13px; font-weight: 500; color: #37352f; margin-right: 4px; }
  #toolbar button {
    font-size: 12px; padding: 4px 10px;
    border: 1px solid #e2e2de; border-radius: 5px;
    background: #fff; color: #6b6b6b; cursor: pointer;
    transition: background .12s, color .12s;
  }
  #toolbar button:hover { background: #f1efe8; color: #37352f; }
  #toolbar .sep { width: 1px; height: 18px; background: #e8e8e5; margin: 0 2px; }
  #hint { margin-left: auto; font-size: 11px; color: #a0a0a0; display: flex; gap: 12px; flex-wrap: wrap; }
  #hint span::before { content: '·'; margin-right: 4px; }

  /* ── 캔버스 영역 ── */
  #canvas-wrap { flex: 1; overflow: hidden; position: relative; background: #fafaf8; }
  canvas { display: block; cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  /* ── 미니맵 ── */
  #minimap {
    position: absolute; bottom: 14px; right: 14px;
    width: 160px; height: 100px;
    border: 1px solid #e2e2de; border-radius: 8px;
    background: rgba(255,255,255,.92); overflow: hidden;
    pointer-events: none;
  }
  #minimap canvas { width: 100%; height: 100%; }

  /* ── 인라인 편집 input ── */
  #node-editor {
    position: absolute; display: none;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    border: 1.5px solid #378add; border-radius: 6px;
    padding: 4px 10px; background: #fff;
    font-size: 13px; color: #37352f;
    outline: none; resize: none; overflow: hidden;
    text-align: center; line-height: 1.5; z-index: 30;
    min-width: 60px;
  }

  /* ── 컨텍스트 메뉴 ── */
  #ctx-menu {
    position: absolute; display: none;
    background: #fff; border: 1px solid #e2e2de;
    border-radius: 8px; padding: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    z-index: 40; min-width: 150px;
  }
  #ctx-menu .item {
    padding: 7px 12px; font-size: 13px; border-radius: 5px;
    cursor: pointer; color: #37352f; display: flex; align-items: center; gap: 7px;
  }
  #ctx-menu .item:hover { background: #f1efe8; }
  #ctx-menu .item.danger { color: #d44; }
  #ctx-menu .item.danger:hover { background: #fff0f0; }
  #ctx-menu .sep { height: 1px; background: #e8e8e5; margin: 3px 0; }

  /* ── 상태바 ── */
  #statusbar {
    padding: 4px 14px; font-size: 11px; color: #aaa;
    border-top: 1px solid #e8e8e5; background: #fff;
    display: flex; gap: 16px; flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="toolbar">
  <span class="title">🧠 Mind Map</span>
  <div class="sep"></div>
  <button id="btn-child">+ 자식 노드</button>
  <button id="btn-sibling">+ 형제 노드</button>
  <button id="btn-root">+ 루트 노드</button>
  <div class="sep"></div>
  <button id="btn-fit">화면 맞춤</button>
  <button id="btn-export">JSON 내보내기</button>
  <button id="btn-import">JSON 가져오기</button>
  <button id="btn-reset">초기화</button>
  <div id="hint">
    <span>더블클릭: 편집</span>
    <span>우클릭: 메뉴</span>
    <span>드래그: 이동</span>
    <span>스크롤: 확대/축소</span>
    <span>Alt+드래그: 화면 이동</span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="mc"></canvas>
  <div id="minimap"><canvas id="mm"></canvas></div>
</div>

<textarea id="node-editor" rows="1"></textarea>
<div id="ctx-menu"></div>

<div id="statusbar">
  <span id="stat-nodes">노드: 0</span>
  <span id="stat-zoom">줌: 100%</span>
  <span id="stat-selected">선택: 없음</span>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 데이터 모델
// ═══════════════════════════════════════════════════════
let nodes = [], edges = [], nextId = 1;
let selectedId = null;

function depth(id) {
  let d = 0, cur = id;
  for(let i=0;i<50;i++) {
    const e = edges.find(e=>e.to===cur);
    if(!e) break;
    cur = e.from; d++;
  }
  return d;
}

function childrenOf(id) { return edges.filter(e=>e.from===id).map(e=>e.to); }
function parentOf(id) { const e = edges.find(e=>e.to===id); return e ? e.from : null; }

function addNode(label, x, y, parentId=null) {
  const id = nextId++;
  nodes.push({id, label, x, y});
  if(parentId!=null) edges.push({from:parentId, to:id});
  return id;
}

function removeTree(id) {
  childrenOf(id).forEach(c=>removeTree(c));
  nodes = nodes.filter(n=>n.id!==id);
  edges = edges.filter(e=>e.from!==id && e.to!==id);
}

// ═══════════════════════════════════════════════════════
// 색상 팔레트 (노션 감성)
// ═══════════════════════════════════════════════════════
const PALETTE = [
  {fill:'#37352f', stroke:'#37352f', text:'#fff'},       // 0 root
  {fill:'#e8f3fa', stroke:'#7ec0e8', text:'#2a6a8a'},    // 1
  {fill:'#e8f5ee', stroke:'#7dc9a0', text:'#276a44'},    // 2
  {fill:'#fdf3e1', stroke:'#f1bf6b', text:'#7a5500'},    // 3
  {fill:'#fae8f0', stroke:'#e897be', text:'#8a2a5a'},    // 4
  {fill:'#eeebfb', stroke:'#a89ce8', text:'#4a3aaa'},    // 5
  {fill:'#fdeee8', stroke:'#f0a07a', text:'#8a3a18'},    // 6
];

function colorOf(id) {
  const d = depth(id);
  if(d===0) return PALETTE[0];
  // 루트의 자식들에게 색상 배분
  const rootId = nodes.find(n=>depth(n.id)===0)?.id;
  const topChildren = childrenOf(rootId||0);
  const topIdx = topChildren.indexOf(id);
  if(topIdx>=0) return PALETTE[(topIdx%6)+1];
  // 더 깊은 노드는 부모 색상 계열 유지
  let cur = id;
  for(let i=0;i<20;i++){
    const p = parentOf(cur);
    if(p==null) break;
    if(depth(p)===0) {
      const idx = topChildren.indexOf(cur);
      return idx>=0 ? PALETTE[(idx%6)+1] : PALETTE[1];
    }
    cur = p;
  }
  return PALETTE[1];
}

// ═══════════════════════════════════════════════════════
// 캔버스 & 뷰포트
// ═══════════════════════════════════════════════════════
const wrap = document.getElementById('canvas-wrap');
const mc = document.getElementById('mc');
const ctx = mc.getContext('2d');
const mm = document.getElementById('mm');
const mctx = mm.getContext('2d');

let W, H;
let pan = {x:0, y:0}, zoom = 1;
let dragging = null, dragOff = {x:0,y:0};
let panning = false, panStart = {x:0,y:0}, panOrigin = {x:0,y:0};
let isDirty = false;

function resize() {
  const r = wrap.getBoundingClientRect();
  W = r.width; H = r.height;
  mc.width = W * devicePixelRatio;
  mc.height = H * devicePixelRatio;
  mc.style.width = W+'px'; mc.style.height = H+'px';
  mm.width = 320; mm.height = 200;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}

function toScreen(x,y) { return {x: x*zoom+W/2+pan.x, y: y*zoom+H/2+pan.y}; }
function toWorld(x,y)  { return {x: (x-W/2-pan.x)/zoom, y: (y-H/2-pan.y)/zoom}; }

// ═══════════════════════════════════════════════════════
// 노드 계산
// ═══════════════════════════════════════════════════════
const NODE_PAD_X = 16, NODE_PAD_Y = 9;
const LINE_H = 18;

function measureNode(n, c) {
  const isRoot = depth(n.id)===0;
  const fsize = isRoot ? 14 : depth(n.id)===1 ? 13 : 12;
  ctx.font = `${isRoot?600:400} ${fsize}px -apple-system,'Segoe UI',sans-serif`;
  const lines = n.label.split('\n');
  const maxW = Math.max(50, ...lines.map(l=>ctx.measureText(l).width));
  return {
    w: maxW + NODE_PAD_X*2,
    h: lines.length*LINE_H + NODE_PAD_Y*2,
    fsize, lines, isRoot
  };
}

// ═══════════════════════════════════════════════════════
// 그리기
// ═══════════════════════════════════════════════════════
function drawEdge(from, to) {
  const fs = toScreen(from.x, from.y);
  const ts = toScreen(to.x, to.y);
  const d = depth(to.id);
  const col = colorOf(to.id);

  ctx.beginPath();
  ctx.moveTo(fs.x, fs.y);
  const mx = (fs.x+ts.x)/2;
  ctx.bezierCurveTo(mx, fs.y, mx, ts.y, ts.x, ts.y);
  ctx.strokeStyle = col.stroke;
  ctx.lineWidth = d===1 ? 1.8 : d===2 ? 1.2 : 0.9;
  ctx.globalAlpha = d===1 ? 0.6 : 0.4;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawNode(n) {
  const col = colorOf(n.id);
  const m = measureNode(n, col);
  const s = toScreen(n.x, n.y);
  const x = s.x - m.w/2*zoom, y = s.y - m.h/2*zoom;
  const w = m.w*zoom, h = m.h*zoom;
  const isRoot = m.isRoot;
  const isSelected = n.id===selectedId;

  const r = isRoot ? 10*zoom : 6*zoom;

  // 선택 링
  if(isSelected) {
    ctx.beginPath();
    ctx.roundRect(x-3, y-3, w+6, h+6, r+3);
    ctx.strokeStyle = '#378add';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // 배경
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fillStyle = isRoot ? col.fill : col.fill;
  ctx.fill();
  ctx.strokeStyle = col.stroke;
  ctx.lineWidth = isRoot ? 0 : 0.8;
  if(!isRoot) ctx.stroke();

  // 텍스트
  ctx.fillStyle = col.text;
  const fz = Math.max(9, m.fsize*zoom);
  ctx.font = `${isRoot?600:400} ${fz}px -apple-system,'Segoe UI',sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  m.lines.forEach((line, li) => {
    const lh = LINE_H*zoom;
    const ty = s.y + (li-(m.lines.length-1)/2)*lh;
    ctx.fillText(line, s.x, ty);
  });
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // 격자 배경
  const gs = 28*zoom;
  ctx.strokeStyle = '#f0eeeb';
  ctx.lineWidth = 0.5;
  const ox = (pan.x+W/2)%gs, oy = (pan.y+H/2)%gs;
  for(let x=ox-gs;x<W+gs;x+=gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=oy-gs;y<H+gs;y+=gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  edges.forEach(e=>{
    const from=nodes.find(n=>n.id===e.from), to=nodes.find(n=>n.id===e.to);
    if(from&&to) drawEdge(from,to);
  });
  nodes.forEach(n=>drawNode(n));

  // 미니맵
  drawMinimap();
  updateStatus();
}

function drawMinimap() {
  mctx.clearRect(0,0,320,200);
  mctx.fillStyle='#fafaf8';
  mctx.fillRect(0,0,320,200);

  if(!nodes.length) return;
  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minX=Math.min(...xs)-100, maxX=Math.max(...xs)+100;
  const minY=Math.min(...ys)-60, maxY=Math.max(...ys)+60;
  const scX=280/(maxX-minX||1), scY=160/(maxY-minY||1);
  const sc = Math.min(scX,scY, 1);
  const offX = 160 - (minX+maxX)/2*sc, offY = 100 - (minY+maxY)/2*sc;

  edges.forEach(e=>{
    const f=nodes.find(n=>n.id===e.from), t=nodes.find(n=>n.id===e.to);
    if(!f||!t) return;
    mctx.beginPath();
    mctx.moveTo(f.x*sc+offX, f.y*sc+offY);
    mctx.lineTo(t.x*sc+offX, t.y*sc+offY);
    mctx.strokeStyle='#ccc'; mctx.lineWidth=0.8; mctx.stroke();
  });
  nodes.forEach(n=>{
    const col=colorOf(n.id);
    mctx.beginPath();
    mctx.arc(n.x*sc+offX, n.y*sc+offY, depth(n.id)===0?6:3, 0, Math.PI*2);
    mctx.fillStyle=col.stroke; mctx.fill();
  });

  // 뷰포트 표시
  const vx1=toWorld(0,0), vx2=toWorld(W,H);
  const vl=(vx1.x)*sc+offX, vt=(vx1.y)*sc+offY;
  const vw=(vx2.x-vx1.x)*sc, vh=(vx2.y-vx1.y)*sc;
  mctx.strokeStyle='rgba(55,82,200,.4)'; mctx.lineWidth=1;
  mctx.strokeRect(vl,vt,vw,vh);
}

function updateStatus() {
  document.getElementById('stat-nodes').textContent = '노드: '+nodes.length;
  document.getElementById('stat-zoom').textContent = '줌: '+Math.round(zoom*100)+'%';
  const sel = nodes.find(n=>n.id===selectedId);
  document.getElementById('stat-selected').textContent = sel ? '선택: '+sel.label.split('\n')[0] : '선택: 없음';
}

// ═══════════════════════════════════════════════════════
// 히트 테스트
// ═══════════════════════════════════════════════════════
function hitNode(mx, my) {
  for(let i=nodes.length-1;i>=0;i--) {
    const n=nodes[i];
    const m=measureNode(n);
    const s=toScreen(n.x,n.y);
    if(Math.abs(mx-s.x)<m.w/2*zoom && Math.abs(my-s.y)<m.h/2*zoom) return n;
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// 이벤트
// ═══════════════════════════════════════════════════════
mc.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  closeCtxMenu();
  const rect=mc.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hit=hitNode(mx,my);

  if(e.altKey || !hit) {
    panning=true;
    panStart={x:e.clientX,y:e.clientY};
    panOrigin={x:pan.x,y:pan.y};
    mc.classList.add('dragging');
    if(hit) { selectedId=hit.id; draw(); }
    return;
  }
  selectedId=hit.id;
  dragging=hit;
  const w=toWorld(mx,my);
  dragOff={x:w.x-hit.x, y:w.y-hit.y};
  mc.classList.add('dragging');
  draw();
});

mc.addEventListener('mousemove', e=>{
  const rect=mc.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  if(dragging) {
    const w=toWorld(mx,my);
    dragging.x=w.x-dragOff.x;
    dragging.y=w.y-dragOff.y;
    draw(); return;
  }
  if(panning) {
    pan.x=panOrigin.x+(e.clientX-panStart.x);
    pan.y=panOrigin.y+(e.clientY-panStart.y);
    draw(); return;
  }
});

mc.addEventListener('mouseup', ()=>{
  dragging=null; panning=false;
  mc.classList.remove('dragging');
});

// 더블클릭 편집
mc.addEventListener('dblclick', e=>{
  const rect=mc.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hit=hitNode(mx,my);
  if(!hit) { addNodeAtWorld(toWorld(mx,my)); return; }
  openEditor(hit);
});

// 우클릭 메뉴
mc.addEventListener('contextmenu', e=>{
  e.preventDefault();
  const rect=mc.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hit=hitNode(mx,my);
  if(hit) { selectedId=hit.id; draw(); }
  showCtxMenu(e.clientX, e.clientY, hit, mx, my);
});

// 줌
mc.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect=mc.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const d=-e.deltaY*0.0008;
  const nz=Math.min(4, Math.max(0.15, zoom*(1+d)));
  pan.x=mx-(mx-W/2-pan.x)*nz/zoom-W/2;
  pan.y=my-(my-H/2-pan.y)*nz/zoom-H/2;
  zoom=nz; draw();
},{passive:false});

// 키보드
document.addEventListener('keydown', e=>{
  if(e.target===editor) return;
  if(e.key==='Delete'||e.key==='Backspace') {
    if(selectedId!==null && depth(selectedId)>0) {
      removeTree(selectedId); selectedId=null; draw();
    }
  }
  if(e.key==='Tab') {
    e.preventDefault();
    if(selectedId!=null) addChildNode(selectedId);
  }
  if(e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    if(selectedId!=null) {
      const n=nodes.find(n=>n.id===selectedId);
      if(n) openEditor(n);
    }
  }
  if(e.key==='Escape') closeCtxMenu();
});

// ═══════════════════════════════════════════════════════
// 노드 추가 헬퍼
// ═══════════════════════════════════════════════════════
function addChildNode(parentId) {
  const parent=nodes.find(n=>n.id===parentId); if(!parent) return;
  const kids=childrenOf(parentId);
  const angle = kids.length ? Math.random()*Math.PI*2 : (Math.random()-0.5)*Math.PI;
  const dist = depth(parentId)===0 ? 200 : 150;
  const id=addNode('새 노드', parent.x+Math.cos(angle)*dist, parent.y+Math.sin(angle)*dist, parentId);
  selectedId=id; draw();
  const n=nodes.find(n=>n.id===id);
  setTimeout(()=>openEditor(n), 40);
  return id;
}

function addSiblingNode(sibId) {
  const p=parentOf(sibId);
  if(p==null) { addChildNode(sibId); return; }
  const sib=nodes.find(n=>n.id===sibId);
  const angle=(Math.random()-0.5)*Math.PI*0.6;
  const dist=150;
  const id=addNode('새 노드', sib.x+Math.cos(angle)*dist, sib.y+Math.sin(angle)*dist, p);
  selectedId=id; draw();
  const n=nodes.find(n=>n.id===id);
  setTimeout(()=>openEditor(n), 40);
}

function addNodeAtWorld(wp) {
  const id=addNode('새 노드', wp.x, wp.y, null);
  selectedId=id; draw();
  const n=nodes.find(n=>n.id===id);
  setTimeout(()=>openEditor(n), 40);
}

// ═══════════════════════════════════════════════════════
// 인라인 편집기
// ═══════════════════════════════════════════════════════
const editor=document.getElementById('node-editor');
let editTarget=null;

function openEditor(n) {
  editTarget=n;
  const m=measureNode(n);
  const s=toScreen(n.x,n.y);
  const rect=wrap.getBoundingClientRect();
  const ex=s.x-m.w/2*zoom+rect.left, ey=s.y-m.h/2*zoom+rect.top;
  editor.style.left=ex+'px'; editor.style.top=ey+'px';
  editor.style.width=(m.w*zoom)+'px';
  editor.style.minHeight=(m.h*zoom)+'px';
  editor.style.fontSize=(m.fsize*zoom)+'px';
  editor.value=n.label;
  editor.style.display='block';
  editor.focus(); editor.select();
  editor.addEventListener('input', autoResizeEditor);
  autoResizeEditor();
}

function autoResizeEditor() {
  editor.style.height='auto';
  editor.style.height=editor.scrollHeight+'px';
}

function closeEditor() {
  if(!editTarget) return;
  editTarget.label=editor.value.trim()||editTarget.label;
  editor.style.display='none';
  editTarget=null;
  editor.removeEventListener('input', autoResizeEditor);
  draw();
}

editor.addEventListener('blur', closeEditor);
editor.addEventListener('keydown', e=>{
  if(e.key==='Escape') { editor.blur(); }
  if(e.key==='Tab') { e.preventDefault(); editor.blur(); if(editTarget) addChildNode(editTarget.id); }
});

// ═══════════════════════════════════════════════════════
// 컨텍스트 메뉴
// ═══════════════════════════════════════════════════════
const ctxMenu=document.getElementById('ctx-menu');

function showCtxMenu(cx, cy, hit, mx, my) {
  ctxMenu.innerHTML='';
  const item=(icon, label, fn, cls='')=>{
    const d=document.createElement('div');
    d.className='item '+(cls||'');
    d.innerHTML=`<span>${icon}</span><span>${label}</span>`;
    d.onclick=()=>{ closeCtxMenu(); fn(); };
    ctxMenu.appendChild(d);
  };
  const sep=()=>{ const d=document.createElement('div'); d.className='sep'; ctxMenu.appendChild(d); };

  if(hit) {
    item('➕','자식 노드 추가 (Tab)',()=>addChildNode(hit.id));
    item('↔️','형제 노드 추가',()=>addSiblingNode(hit.id));
    item('✏️','이름 편집 (Enter)',()=>openEditor(hit));
    sep();
    if(depth(hit.id)>0) item('🗑','이 노드 및 자식 삭제',()=>{ removeTree(hit.id); selectedId=null; draw(); },'danger');
  } else {
    const wp=toWorld(mx,my);
    item('➕','새 루트 노드 추가',()=>addNodeAtWorld(wp));
  }

  ctxMenu.style.left=cx+'px'; ctxMenu.style.top=cy+'px';
  ctxMenu.style.display='block';
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),10);
}

function closeCtxMenu() { ctxMenu.style.display='none'; }

// ═══════════════════════════════════════════════════════
// 툴바 버튼
// ═══════════════════════════════════════════════════════
document.getElementById('btn-child').onclick=()=>{ if(selectedId!=null) addChildNode(selectedId); };
document.getElementById('btn-sibling').onclick=()=>{ if(selectedId!=null) addSiblingNode(selectedId); };
document.getElementById('btn-root').onclick=()=>{ addNodeAtWorld(toWorld(W/2+Math.random()*100-50, H/2+Math.random()*100-50)); };

document.getElementById('btn-fit').onclick=()=>{
  if(!nodes.length) return;
  const xs=nodes.map(n=>n.x), ys=nodes.map(n=>n.y);
  const cx=(Math.min(...xs)+Math.max(...xs))/2;
  const cy=(Math.min(...ys)+Math.max(...ys))/2;
  const rw=(Math.max(...xs)-Math.min(...xs))||200;
  const rh=(Math.max(...ys)-Math.min(...ys))||200;
  zoom=Math.min(1.2, Math.min(W/(rw+200), H/(rh+140)));
  pan={x:-cx*zoom, y:-cy*zoom};
  draw();
};

document.getElementById('btn-export').onclick=()=>{
  const data=JSON.stringify({nodes,edges,nextId},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='mindmap.json'; a.click();
};

document.getElementById('btn-import').onclick=()=>{
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        nodes=d.nodes; edges=d.edges; nextId=d.nextId;
        draw();
      } catch { alert('잘못된 JSON 파일입니다.'); }
    };
    r.readAsText(f);
  };
  inp.click();
};

document.getElementById('btn-reset').onclick=()=>{
  if(!confirm('마인드맵을 초기화할까요?')) return;
  nodes=[]; edges=[]; nextId=1;
  initDefault(); draw();
};

// ═══════════════════════════════════════════════════════
// 기본 데이터
// ═══════════════════════════════════════════════════════
function initDefault() {
  nodes=[]; edges=[]; nextId=1;
  const root=addNode('중심 주제', 0, 0);
  const branches=[
    {label:'아이디어 A', angle:-140, dist:220, subs:['세부 항목 1','세부 항목 2','세부 항목 3']},
    {label:'아이디어 B', angle:-40,  dist:220, subs:['내용 A','내용 B']},
    {label:'아이디어 C', angle:40,   dist:220, subs:['항목 1','항목 2','항목 3']},
    {label:'아이디어 D', angle:140,  dist:220, subs:['메모','아이디어']},
  ];
  branches.forEach(b=>{
    const rad=b.angle*Math.PI/180;
    const bx=Math.cos(rad)*b.dist, by=Math.sin(rad)*b.dist;
    const bid=addNode(b.label, bx, by, root);
    b.subs.forEach((s,j)=>{
      const cnt=b.subs.length;
      const srad=rad+(j-(cnt-1)/2)*0.5;
      const sd=155;
      addNode(s, bx+Math.cos(srad)*sd, by+Math.sin(srad)*sd, bid);
    });
  });
  pan={x:0,y:0}; zoom=1;
}

// ═══════════════════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════════════════
initDefault();
window.addEventListener('resize', resize);
resize();
</script>
</body>
